<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 번호 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">

  <div class="hero">
    <div class="hero-eyebrow">역대 1,161회 데이터 분석</div>
    <h1 class="hero-title">로또 6/45<br>번호 분석기</h1>
    <p class="hero-sub">출현 빈도 가중치 알고리즘으로<br>통계적으로 유리한 번호를 추천합니다</p>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val">1,161</div><div class="stat-lbl">분석 회차</div></div>
    <div class="stat"><div class="stat-val">8,127</div><div class="stat-lbl">총 당첨 번호</div></div>
    <div class="stat"><div class="stat-val">1~45</div><div class="stat-lbl">번호 범위</div></div>
  </div>

  <!-- 버튼 -->
  <div class="btn-wrap">
    <button class="gen-btn" id="generate-btn">
      <span class="btn-icon">🎱</span>
      로또번호 추첨 받기
    </button>
    <button class="hot-btn" id="hot-btn">
      <span class="btn-icon">🔥</span>
      자주 나오는 번호 추첨
    </button>
  </div>

  <!-- 결과 -->
  <div class="results" id="results"></div>

  <!-- 히트맵 -->
  <div class="heatmap-wrap">
    <div class="sec-head"><h2>번호별 출현 히트맵</h2></div>
    <div class="legend-row">
      <div class="legend-item"><div class="ldot" style="background:rgba(232,69,60,0.3)"></div>낮음</div>
      <div class="legend-item"><div class="ldot" style="background:rgba(245,200,66,0.35)"></div>보통</div>
      <div class="legend-item"><div class="ldot" style="background:rgba(91,140,238,0.35)"></div>높음</div>
      <div class="legend-item"><div class="ldot" style="background:rgba(62,207,142,0.35)"></div>매우높음</div>
    </div>
    <div class="heatmap" id="heatmap"></div>
  </div>

  <!-- HOT/COLD -->
  <div class="hotcold">
    <div class="hc-card">
      <div class="hc-title hot">🔥 자주 나온 번호 (HOT)</div>
      <div class="ball-row" id="hot-balls"></div>
    </div>
    <div class="hc-card">
      <div class="hc-title cold">❄️ 덜 나온 번호 (COLD)</div>
      <div class="ball-row" id="cold-balls"></div>
    </div>
  </div>

  <!-- 바 차트 -->
  <div class="bar-section">
    <div class="sec-head"><h2>상위 20번호 출현 빈도</h2></div>
    <div class="bar-list" id="bar-list"></div>
  </div>

</div>
<script src="main.js"></script>
</body>
</html>
